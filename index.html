<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thubalesha Trading</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{background:#000;color:#fff}

header{
background:linear-gradient(135deg,#000,#111);
padding:25px;
text-align:center;
border-bottom:2px solid gold;
}

header h1{color:gold}

.section{padding:25px;max-width:1200px;margin:auto}

h2{color:gold;margin-bottom:15px}

.search{
width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:20px
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px
}

.card{
background:#111;padding:15px;border-radius:12px;border:1px solid #222;text-align:center
}

.card img{width:100%;height:140px;object-fit:contain}

.price{margin:10px 0;color:#00ffcc;font-size:14px}

.plan-btn{
margin:5px;padding:8px 10px;border:none;border-radius:6px;cursor:pointer;
background:#222;color:#fff
}

.plan-btn.active{background:gold;color:#000}

.button{
display:inline-block;margin-top:10px;padding:10px 15px;background:gold;color:#000;border-radius:6px;text-decoration:none;font-weight:bold;font-size:14px
}

.whatsapp{background:#25D366;color:#fff}

.footer{
background:#111;padding:20px;text-align:center;margin-top:30px;border-top:2px solid gold
}

.small{font-size:12px;color:#aaa;margin-top:5px}
</style>
</head>

<body>

<header>
<h1>Thubalesha Trading</h1>
<p>Rent-To-Own Smartphones</p>
<p>No Credit Check • Flexible Payments • Own It After Payment</p>
</header>

<section class="section">
<h2>📱 Choose Your Phone</h2>

<input type="text" class="search" placeholder="Search phone..." onkeyup="searchPhones(this.value)">

<div class="cards" id="phoneList"></div>
</section>

<section class="section" style="background:#111">
<h2>💳 Pay Deposit</h2>
<div id="yoco-button"></div>
</section>

<section class="section">
<h2>📝 Application</h2>

<form onsubmit="submitForm(event)">
<input type="text" id="name" placeholder="Full Name" required class="search">
<input type="text" id="phone" placeholder="Phone Number" required class="search">
<input type="text" id="selectedPhone" placeholder="Selected Phone" required class="search">
<input type="text" id="selectedPlan" placeholder="Selected Plan" required class="search">

<button class="button">Submit Application</button>
</form>
</section>

<div class="footer">
<p>📍 Sebokeng & Emfuleni</p>
<p>📞 078 710 2337</p>
<p>📧 thubalesha0001@gmail.com</p>
</div>

<script>

const phones = [
{name:"Samsung A05",price:2500},{name:"Samsung A15",price:3000},
{name:"Redmi 13C",price:2200},{name:"Nokia C32",price:2600},
{name:"Honor X6c",price:2400},{name:"Samsung A25",price:3800},
{name:"Samsung A34",price:4500},{name:"Redmi Note 12",price:3500},
{name:"Redmi Note 13",price:4000},{name:"Huawei Y70",price:3000},
{name:"Huawei Y90",price:3400},{name:"Oppo A38",price:3200},
{name:"Oppo A58",price:3600},{name:"Realme C53",price:2800},
{name:"Realme Note 50",price:2600},{name:"iPhone 11",price:7000},
{name:"iPhone 12",price:9000},{name:"Samsung S20 FE",price:6500},
{name:"Samsung S21",price:9500},{name:"Huawei P30 Pro",price:6000},
{name:"Redmi Note 11",price:3200},{name:"Samsung A14",price:3000},
{name:"Tecno Spark 10",price:2500},{name:"Infinix Smart 8",price:2200},
{name:"Itel P40",price:2000}
];

function calcPlans(price){
return {
m3:{monthly:Math.round((price*1.3)/3),total:Math.round(price*1.3)},
m6:{monthly:Math.round((price*1.5)/6),total:Math.round(price*1.5)},
m12:{monthly:Math.round((price*1.8)/12),total:Math.round(price*1.8)}
};
}

function loadPhones(list){
const container=document.getElementById("phoneList");
container.innerHTML="";

list.forEach((p,i)=>{
const plans=calcPlans(p.price);

container.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>

<div>
<button class="plan-btn active" onclick="selectPlan(${i},'3',${plans.m3.monthly},${plans.m3.total})">3M</button>
<button class="plan-btn" onclick="selectPlan(${i},'6',${plans.m6.monthly},${plans.m6.total})">6M</button>
<button class="plan-btn" onclick="selectPlan(${i},'12',${plans.m12.monthly},${plans.m12.total})">12M</button>
</div>

<p class="price" id="price-${i}">
R${plans.m3.monthly}/m • Total R${plans.m3.total}
</p>

<a class="button" onclick="applyNow('${p.name}','3 Months',${plans.m3.monthly})">Apply</a>

<a class="button whatsapp" id="wa-${i}" target="_blank">WhatsApp</a>

<p class="small">✔ No credit check • ✔ Flexible • ✔ Own after payment</p>
</div>`;
});
updateWhatsApp();
}

function selectPlan(i,months,monthly,total){
document.getElementById(`price-${i}`).innerHTML =
`R${monthly}/m • Total R${total}`;
}

function applyNow(phone,plan,monthly){
document.getElementById("selectedPhone").value=phone;
document.getElementById("selectedPlan").value=plan+" - R"+monthly+"/m";
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function updateWhatsApp(){
phones.forEach((p,i)=>{
document.getElementById(`wa-${i}`).href =
`https://wa.me/27787102337?text=Hi%20I%20want%20${p.name}`;
});
}

function searchPhones(val){
const filtered=phones.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
loadPhones(filtered);
}

function submitForm(e){
e.preventDefault();
alert("Application submitted! We will contact you.");
}

loadPhones(phones);

// Yoco
var script=document.createElement('script');
script.src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js";
script.onload=function(){
const yoco=new window.YocoSDK({publicKey:'pk_test_YOUR_PUBLIC_KEY'});
const btn=document.createElement('button');
btn.innerText="Pay Deposit";
btn.className="button";

btn.onclick=function(){
yoco.showPopup({amountInCents:5000,currency:'ZAR'})
.then(()=>alert("Payment successful"))
.catch(()=>alert("Payment failed"));
};

document.getElementById('yoco-button').appendChild(btn);
};
document.head.appendChild(script);

</script>

</body>
</html>
